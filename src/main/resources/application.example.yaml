spring:
  application:
    name: spring-boot-template
  datasource:
    url: jdbc:mysql://localhost:3306/template?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: springuser
    password: springpassword
    driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQLDialect
